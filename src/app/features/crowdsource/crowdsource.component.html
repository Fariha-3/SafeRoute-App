<m-container>

  <div class="page-card">

    <h2>Submit Safety Report</h2>

    <div *ngIf="error" class="error">{{ error }}</div>
    <div *ngIf="message" class="success">{{ message }}</div>

    <label>Category</label>
    <select [(ngModel)]="report.category">
      <option value="">Select</option>
      <option>Poorly Lit Street</option>
      <option>Damaged Infrastructure</option>
      <option>Security Concern</option>
      <option>Environmental Hazard</option>
    </select>

    <label>Severity</label>
    <select [(ngModel)]="report.severity">
      <option value="">Select</option>
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <label>Description</label>
    <textarea [(ngModel)]="report.description"></textarea>

    <!-- BUTTONS -->
    <div class="button-group">
      <button (click)="addReport()">Submit</button>
      <button (click)="back()">Back</button>
    </div>

    <!-- GEMINI -->
    <div *ngIf="hazardType" class="gemini-box">
      <h3>AI Analysis (Gemini)</h3>

      <p><b>Hazard Type:</b> {{ hazardType }}</p>
      <p><b>Authority:</b> {{ authority }}</p>
      <p><b>Recommended Action:</b> {{ recommendedAction }}</p>
    </div>

  </div>

</m-container>
